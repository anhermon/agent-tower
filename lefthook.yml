# Lefthook — git hooks wiring. Install once with `pnpm lefthook install`.
# Tiers follow docs/superpowers/specs/2026-04-23-ci-quality-gates-design.md.

# T1 — pre-commit: staged-file checks. Budget <10s.
pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc}"
      run: pnpm biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
    eslint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: NODE_OPTIONS=--max-old-space-size=4096 pnpm exec eslint --cache --cache-location .ci/.eslintcache {staged_files}
    gitleaks:
      run: gitleaks protect --staged --config .gitleaks.toml --no-banner --redact

# T2 — pre-push: full fast gate. Budget <2min.
# Script guards against running ci:fast against a working tree that does not
# reflect the branch being pushed (e.g. when renaming from a worktree).
pre-push:
  commands:
    ci-fast:
      run: bash scripts/hooks/pre-push.sh

# Conventional Commits validator via commit-msg regex (no extra deps).
commit-msg:
  commands:
    conventional:
      run: |
        head -n1 {1} | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?!?: .+' \
          || { echo "commit message must follow Conventional Commits"; exit 1; }
