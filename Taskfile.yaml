version: "3"

# Tiered CI gates. See docs/superpowers/specs/2026-04-23-ci-quality-gates-design.md.
# T0 runs in your editor. T1 runs on commit (lefthook). T2 runs on push.
# T3 is `task ci`. T4 is `task ci:nightly`. Reports land in .ci/reports/.

vars:
  WEB_PKG: "@control-plane/web"
  WEB_URL: "http://127.0.0.1:3000"
  # Isolated test server — separate port + separate .next dir so the perf
  # sweep is immune to parallel edits on the dev server / source tree.
  TEST_PORT: "3100"
  TEST_URL: "http://127.0.0.1:3100"
  TEST_DIST: ".next.perf"
  TEST_PIDFILE: ".ci/reports/test-server.pid"
  TEST_LOGFILE: ".ci/reports/test-server.log"

tasks:
  # --- Dev loop -------------------------------------------------------------
  dev:
    desc: Start the web dashboard
    cmds:
      - pnpm dev

  # --- Fast sanity ----------------------------------------------------------
  typecheck:
    desc: TypeScript across all workspaces
    cmds:
      - pnpm typecheck

  test:
    desc: Unit tests across all workspaces
    cmds:
      - pnpm test

  test:coverage:
    desc: Unit tests with enforced coverage thresholds
    cmds:
      - pnpm vitest run --config vitest.coverage.config.ts
      - node scripts/ci/coverage-report.mjs

  test:e2e:
    desc: Playwright (all projects)
    cmds:
      - pnpm test:e2e

  test:e2e:smoke:
    desc: Playwright smoke tier only
    cmds:
      - pnpm playwright test --project=smoke

  test:a11y:
    desc: Accessibility scan (axe-core via Playwright)
    cmds:
      - pnpm playwright test --project=a11y

  test:visual:
    desc: Visual regression (screenshot baselines)
    cmds:
      - pnpm playwright test --project=visual

  # --- Lint / format --------------------------------------------------------
  fmt:
    desc: Biome format + import-sort (write changes)
    cmds:
      - pnpm biome check --write .

  fmt:check:
    desc: Biome format + lint (check only, no writes)
    cmds:
      - pnpm biome check .

  lint:
    desc: ESLint (deep semantic lint — React, hooks, a11y, imports, complexity)
    deps: [build:packages]
    cmds:
      - pnpm eslint .

  # Builds only the workspace packages (not apps/web) so downstream type-aware
  # lint/typecheck can resolve `@control-plane/*` imports against real `dist/`
  # declarations. Without this, ESLint's `projectService` sees the `exports`
  # field pointing at a nonexistent `./dist/index.d.ts` and resolves every
  # import as `error`, fabricating thousands of `@typescript-eslint/no-unsafe-*`
  # findings. Run directly with `task build:packages` to pre-warm a fresh clone.
  build:packages:
    desc: Build workspace packages so downstream type-aware lint resolves imports
    cmds:
      - pnpm --filter "./packages/**" -r build

  # --- Security / quality helpers ------------------------------------------
  audit:
    desc: pnpm audit wrapper (fails on high/critical CVEs)
    cmds:
      - node scripts/ci/audit.mjs

  license:
    desc: License allowlist check (fails on GPL/AGPL/LGPL/SSPL/BUSL/Commons-Clause/EUPL)
    cmds:
      - node scripts/ci/license-check.mjs

  sbom:
    desc: Generate CycloneDX SBOM
    cmds:
      - node scripts/ci/sbom.mjs

  gitleaks:
    desc: Full-repo secret scan
    cmds:
      - gitleaks detect --config .gitleaks.toml --no-banner --redact

  knip:
    desc: Dead-code / unused-exports / unused-deps scan
    cmds:
      - node scripts/ci/knip-run.mjs

  size:
    desc: Bundle-size budgets (requires an existing web build)
    deps: [build:web]
    cmds:
      - node scripts/ci/bundle-size.mjs

  lhci:
    desc: Lighthouse CI against a production build of the web app
    deps: [build:web]
    cmds:
      - pnpm lhci autorun --config=lighthouserc.json

  # --- Isolated test server (port 3100, pinned dist dir) ------------------
  # Built once into {{.TEST_DIST}} and served via `next start`. Because
  # `next start` reads only the pre-built artifacts, edits to source files
  # (including parallel agents modifying components) never affect a running
  # test server. This is the server LHCI + Playwright perf specs talk to —
  # the human dev server on :3000 stays untouched.
  test-server:build:
    desc: Build the web app into {{.TEST_DIST}} (isolated from the dev server)
    cmds:
      - mkdir -p .ci/reports
      - NEXT_DIST_DIR={{.TEST_DIST}} pnpm --filter {{.WEB_PKG}} exec next build

  test-server:up:
    desc: Build + start the isolated test server on {{.TEST_URL}}
    deps: [test-server:build]
    cmds:
      - task: test-server:down
      - |
        mkdir -p .ci/reports
        NEXT_DIST_DIR={{.TEST_DIST}} pnpm --filter {{.WEB_PKG}} exec \
          next start --hostname 127.0.0.1 --port {{.TEST_PORT}} \
          > {{.TEST_LOGFILE}} 2>&1 &
        echo $! > {{.TEST_PIDFILE}}
      - |
        for i in $(seq 1 60); do
          if curl -fsS {{.TEST_URL}}/api/health > /dev/null 2>&1; then
            echo "Test server ready on {{.TEST_URL}} (pid $(cat {{.TEST_PIDFILE}}))"
            exit 0
          fi
          sleep 1
        done
        echo "Test server did not become healthy; last log lines:"
        tail -40 {{.TEST_LOGFILE}} || true
        exit 1

  test-server:down:
    desc: Stop the isolated test server if running
    cmds:
      - |
        if [ -f {{.TEST_PIDFILE}} ]; then
          pid=$(cat {{.TEST_PIDFILE}})
          if kill -0 "$pid" 2>/dev/null; then
            kill "$pid" 2>/dev/null || true
            # give it 3s to exit cleanly, then force
            for i in 1 2 3; do kill -0 "$pid" 2>/dev/null || break; sleep 1; done
            kill -0 "$pid" 2>/dev/null && kill -9 "$pid" 2>/dev/null || true
          fi
          rm -f {{.TEST_PIDFILE}}
        fi
      # Belt-and-suspenders: clear anything still bound to the port
      - lsof -ti tcp:{{.TEST_PORT}} 2>/dev/null | xargs -r kill -9 2>/dev/null || true

  test-server:status:
    desc: Print test server status and last log lines
    cmds:
      - |
        if [ -f {{.TEST_PIDFILE}} ] && kill -0 $(cat {{.TEST_PIDFILE}}) 2>/dev/null; then
          echo "Test server UP (pid $(cat {{.TEST_PIDFILE}})) on {{.TEST_URL}}"
        else
          echo "Test server DOWN"
        fi
      - test -f {{.TEST_LOGFILE}} && tail -20 {{.TEST_LOGFILE}} || true

  lhci:perf:
    desc: Run LHCI against the isolated test server (expects test-server:up)
    cmds:
      - pnpm lhci autorun --config=lighthouserc.perf.json

  # --- Builds ---------------------------------------------------------------
  build:
    desc: Build all workspace packages
    cmds:
      - pnpm -r build

  build:web:
    desc: Production build of the web app
    cmds:
      - pnpm --filter {{.WEB_PKG}} build

  # --- Heavy nightly-only ---------------------------------------------------
  osv:
    desc: osv-scanner deep vulnerability scan (requires osv-scanner binary)
    cmds:
      - osv-scanner --lockfile=pnpm-lock.yaml --format=json --output=.ci/reports/osv.json || true

  semgrep:
    desc: SAST scan via semgrep (requires semgrep binary)
    cmds:
      - semgrep --config=auto --json --output=.ci/reports/semgrep.json . || true

  stryker:
    desc: Mutation testing (pure-logic packages only)
    cmds:
      - pnpm -r --filter @control-plane/core --filter @control-plane/events exec stryker run

  outdated:
    desc: Report outdated dependencies
    cmds:
      - pnpm outdated --long --recursive > .ci/reports/outdated.txt || true

  # --- Tiered composites ---------------------------------------------------
  verify:
    desc: "Local sanity: typecheck + unit tests (kept for backwards compat)"
    cmds:
      - task: typecheck
      - task: test

  ci:fast:
    desc: "T2 (pre-push): lint + types + unit+coverage + build + quick audit"
    cmds:
      - task: fmt:check
      - task: lint
      - task: typecheck
      - task: test:coverage
      - task: build
      - task: audit

  ci:security:
    desc: "T3 subset: audit + license + sbom + gitleaks"
    cmds:
      - task: audit
      - task: license
      - task: sbom
      - task: gitleaks

  ci:perf:
    desc: "T3 subset: web build + lhci + bundle-size"
    cmds:
      - task: build:web
      - task: lhci
      - task: size

  ci:
    desc: "T3: full gate — correctness + security + perf + cleanliness"
    cmds:
      - task: ci:fast
      - task: knip
      - task: license
      - task: sbom
      - task: gitleaks
      - task: test:e2e:smoke
      - task: test:a11y
      - task: ci:perf
      - task: ci:health

  ci:nightly:
    desc: "T4: deep/expensive — full e2e + visual + osv + semgrep + stryker + outdated"
    cmds:
      - task: ci
      - task: test:e2e
      - task: test:visual
      - task: osv
      - task: semgrep
      - task: stryker
      - task: outdated
      - task: ci:health

  ci:health:
    desc: Aggregate all .ci/reports/*.json into latest.json and print a health board
    cmds:
      - node scripts/ci-health.mjs

  # --- GitHub repository operations -----------------------------------------
  github:webhook:create:
    desc: Create or update the GitHub repo webhook for inbound control-plane events
    cmds:
      - node scripts/github/setup-webhook.mjs

  github:branch-protect:
    desc: Configure GitHub branch protection for main
    cmds:
      - node scripts/github/configure-branch-protection.mjs
