# .github/workflows/claude.yml
#
# Copy this file into your repository's .github/workflows/ directory.
# After copying, add the required secret(s) shown below to the repo settings.
#
# What this does
# ──────────────
# • @claude mentions in issue comments and PR review comments trigger a Claude
#   Code session headless inside a GitHub Actions runner.
# • Newly-opened issues (when labelled "claude" or "ai") trigger Claude to
#   analyse the issue and open a draft PR with a proposed implementation.
# • Every run emits a workflow_run event — wire your Agent Tower webhook to
#   receive these events and they will appear in the Webhook Sessions panel.
#
# Auth: choose ONE of the two options below.
#   Option A — API key:  add secret ANTHROPIC_API_KEY
#   Option B — Max sub:  run `claude setup-token` locally, add the printed
#               sk-ant-oat01-… value as secret CLAUDE_CODE_OAUTH_TOKEN
#
# See docs/templates/claude-setup.md for step-by-step instructions.

name: claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only run when @claude is mentioned, or when an issue is opened/labelled.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (github.event.action == 'opened' || contains(github.event.label.name, 'claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # ── Option A: API key ────────────────────────────────────────────
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # ── Option B: Max subscription OAuth token ───────────────────────
          # Comment out the line above and uncomment the line below.
          # claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # For issue-to-PR automation: instruct Claude to implement the issue.
          # Remove or change this if you only want @mention-driven interactions.
          direct_prompt: |
            ${{ github.event_name == 'issues' && 'Analyse this issue carefully. If it describes a well-scoped bug or feature, implement it and open a draft pull request. If the issue is unclear, ask a clarifying question in a comment instead of implementing.' || '' }}

          # Optional: restrict Claude to specific file paths.
          # allowed_tools: "Bash,Edit,Write,Read"
