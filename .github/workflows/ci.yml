name: ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache CI artifacts
        uses: actions/cache@v4
        with:
          path: |
            .ci/.eslintcache
            .turbo
          key: ${{ runner.os }}-ci-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Install Playwright system dependencies
        run: sudo env PATH="$PNPM_HOME:$PATH" pnpm exec playwright install-deps chromium

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Run ci
        run: task ci
