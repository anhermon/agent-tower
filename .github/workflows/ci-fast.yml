name: ci-fast

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci-fast:
    name: ci-fast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache CI artifacts
        uses: actions/cache@v4
        with:
          path: |
            .ci/.eslintcache
            .turbo
          key: ${{ runner.os }}-ci-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: task fmt:check

      - name: Build packages
        run: task build:packages

      - name: Lint changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.base_ref }}"
          else
            BASE_REF="main"
          fi
          changed_files=$(git diff --name-only --diff-filter=ACMRT origin/$BASE_REF...HEAD | grep -E '\.(ts|tsx|mjs|js|jsx)$' || true)
          if [ -n "$changed_files" ]; then
            echo "$changed_files" | xargs -r pnpm eslint --cache --cache-location .ci/.eslintcache
          else
            echo "No TypeScript/JavaScript files changed."
          fi

      - name: Type check
        run: task typecheck

      - name: Test with coverage
        run: task test:coverage

      - name: Build
        run: task build

      - name: Audit
        run: task audit
